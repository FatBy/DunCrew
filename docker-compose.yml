# DD-OS Docker Compose 配置
# 一键启动完整的 AI 操作系统环境

version: '3.8'

services:
  ddos:
    build: .
    container_name: dd-os
    ports:
      - "4173:4173"   # 前端界面
      - "3001:3001"   # 后端 API
    volumes:
      # 持久化数据目录（记忆、配置等）
      - ddos-data:/root/.ddos
      # 挂载 skills 目录，方便热更新技能（可选）
      # - ./skills:/app/skills
    environment:
      - TZ=Asia/Shanghai
      - SEARXNG_URL=http://searxng:8080
    depends_on:
      - searxng
    restart: unless-stopped

  # SearXNG 聚合搜索引擎 (免费、自托管、70+ 搜索源)
  searxng:
    image: searxng/searxng:latest
    container_name: duncrew-searxng
    ports:
      - "8888:8080"   # 宿主机 8888 → 容器 8080
    volumes:
      - searxng-data:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    restart: unless-stopped

volumes:
  ddos-data:
    name: ddos-data
  searxng-data:
    name: searxng-data
